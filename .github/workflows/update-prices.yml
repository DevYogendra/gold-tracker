name: Update Historical Prices

on:
  schedule:
    # Runs at 06:00 UTC daily (after London open, metals priced)
    - cron: '0 6 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run price updater
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: node scripts/update-prices.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          git diff --cached --quiet || git commit -m "chore: update current-year price averages [$(date -u +%Y-%m-%d)]"
          git push
